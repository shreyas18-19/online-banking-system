<!DOCTYPE html>
<html>
<head>
    <title>Login - SD Bank</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            background:linear-gradient(135deg,#020617,#0f172a,#111827);
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
        }

        .box{
            width:380px;
            padding:35px;
            border-radius:20px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.15);
            box-shadow:0 25px 60px rgba(0,0,0,0.4);
        }

        h2{
            text-align:center;
            margin-bottom:10px;
            color:#38bdf8;
        }

        .sub{
            text-align:center;
            font-size:14px;
            color:#cbd5e1;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            margin:10px 0;
            font-size:15px;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            background:#1d4ed8;
        }

        .hint{
            margin-top:15px;
            font-size:13px;
            color:#94a3b8;
            text-align:center;
        }

        .register{
            margin-top:15px;
            text-align:center;
        }

        .register a{
            color:#38bdf8;
            text-decoration:none;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>SD Secure Bank</h2>
    <p class="sub">Login to access your account</p>

    <!-- IMPORTANT: tuza action same thevla -->
    <form action="/onlinebank/login" method="post">

        <input type="email" name="email" placeholder="Enter your email" required>

        <input type="password" name="password" placeholder="Enter your password" required>

        <button type="submit">Login</button>

    </form>

    <!-- Example -->
    <div class="hint">
        Example: test@gmail.com / 1234
    </div>

    <div class="register">
        Don't have an account? <a href="register.html">Register</a>
    </div>
    <br><br>
<a href="forgot-password.html">Forgot Password?</a>
</div>

</body>
</html>
